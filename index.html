<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>漢字練習帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap');

:root {
  --bg:      #fafaf8;
  --surface: #ffffff;
  --bd:      #e8e4de;
  --bd2:     #cec8bc;
  --ink:     #1c1917;
  --ink2:    #78716c;
  --ink3:    #a8a29e;
  --ok:      #16a34a;
  --ng:      #dc2626;
  --kf: 'Zen Kurenaido', 'Hiragino Maru Gothic ProN', 'Yu Gothic', cursive;
  --uf: 'Zen Kurenaido', 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
  --r: 8px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}
body {
  width: 100%;
  height: 100%;
  height: 100dvh;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--uf);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  overflow: hidden;
  padding-top: var(--sat);
  padding-left: var(--sal);
  padding-right: var(--sar);
}

#root {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}

/* ── ヘッダー ── */
#hdr {
  flex-shrink: 0;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--bd);
}
#hdr-title {
  font-family: var(--kf);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .1em;
}
.hdr-btns { display: flex; gap: 8px; }
.hbtn {
  height: 34px;
  padding: 0 14px;
  border: 1px solid var(--bd2);
  border-radius: var(--r);
  background: none;
  font-family: var(--uf);
  font-size: 12px;
  color: var(--ink2);
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .15s;
  white-space: nowrap;
}
.hbtn:active { background: var(--bd); }
.hbtn.on { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── ナビ ── */
#nav {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--bd);
}
#pill-wrap {
  flex: 1;
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 2px 0;
}
#pill-wrap::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  width: 38px; height: 38px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 1px solid var(--bd);
  border-radius: 6px;
  cursor: pointer;
  background: var(--bg);
  position: relative;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.pill-k { font-family: var(--kf); font-size: 18px; color: var(--ink); line-height: 1; }
.pill-n { font-size: 8px; color: var(--ink3); position: absolute; bottom: 1px; right: 3px; }
.pill.active { border-color: var(--ink); background: var(--ink); }
.pill.active .pill-k { color: #fff; }
.pill.ok { border-color: var(--ok); }
.pill.ng { border-color: var(--ng); }
body.hide-mode .pill-k { color: transparent !important; background: var(--bd); border-radius: 2px; }
.narr {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border: 1px solid var(--bd2);
  border-radius: 6px;
  background: none;
  font-size: 18px; color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.narr:disabled { opacity: .2; cursor: default; }
.narr:active:not(:disabled) { background: var(--bd); }

/* ── メイン ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

#info-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--bd);
}
#info-kanji {
  font-family: var(--kf);
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
  min-width: 62px;
  text-align: center;
  transition: all .2s;
  flex-shrink: 0;
}
body.hide-mode:not(.ans-shown) #info-kanji {
  color: transparent;
  background: var(--bd);
  border-radius: 6px;
  user-select: none;
}
.info-sep { width: 1px; height: 48px; background: var(--bd); margin: 0 14px; flex-shrink: 0; }
.info-text { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
#info-yomi { font-family: var(--kf); font-size: 16px; color: var(--ink); letter-spacing: .04em; }
#info-hint { font-size: 11px; color: var(--ink3); letter-spacing: .04em; }
#info-num { font-size: 11px; color: var(--ink3); letter-spacing: .05em; }

#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--surface);
  min-height: 0;
}
#canvas-wrap::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--bd) 1px, transparent 1px),
    linear-gradient(90deg, var(--bd) 1px, transparent 1px);
  background-size: 50% 50%;
  pointer-events: none; z-index: 1;
}
#canvas-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--bd2) 1px, transparent 1px),
    linear-gradient(90deg, var(--bd2) 1px, transparent 1px);
  background-size: 100% 100%;
  background-position: center;
  opacity: .45;
  pointer-events: none; z-index: 1;
}
#ans-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--kf);
  font-size: min(55vw, 55vh);
  font-weight: 700;
  color: var(--ink);
  opacity: 0;
  pointer-events: none; z-index: 2;
  transition: opacity .25s;
  user-select: none;
}
#ans-overlay.show { opacity: .13; }
#write-canvas {
  position: absolute; inset: 0;
  z-index: 3;
  touch-action: none;
  cursor: crosshair;
}

/* ── ボトムバー ── */
#bottom-bar {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--bd);
  padding: 10px 12px;
  padding-bottom: calc(10px + var(--sab));
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bar-row { display: flex; align-items: center; gap: 8px; }
.act-btn {
  flex: 1;
  height: 44px;
  border: 1px solid var(--bd2);
  border-radius: var(--r);
  background: none;
  font-family: var(--kf);
  font-size: 14px;
  color: var(--ink2);
  cursor: pointer;
  letter-spacing: .06em;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.act-btn:active { background: var(--bd); }
#ans-btn {
  flex: 2;
  height: 44px;
  border: 1px solid var(--bd2);
  border-radius: var(--r);
  background: none;
  font-family: var(--kf);
  font-size: 14px;
  color: var(--ink2);
  cursor: pointer;
  letter-spacing: .06em;
  transition: all .15s;
}
#ans-btn:active { background: var(--bd); }
#ans-btn.showing { background: var(--ink); color: #fff; border-color: var(--ink); }
.pen-dot {
  width: 36px; height: 36px;
  border: 1px solid var(--bd2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; flex-shrink: 0;
}
.pen-dot.sel { border-color: var(--ink); background: var(--ink); }
.pen-dot.sel .dot-c { background: #fff; }
.dot-c { border-radius: 50%; background: var(--ink); pointer-events: none; }

#judge-row {
  display: flex;
  gap: 8px;
  overflow: hidden;
  max-height: 0;
  transition: max-height .22s ease, opacity .2s;
  opacity: 0;
}
#judge-row.visible { max-height: 52px; opacity: 1; }
.jbtn {
  flex: 1; height: 44px;
  border-radius: var(--r);
  font-family: var(--kf);
  font-size: 15px;
  cursor: pointer;
  letter-spacing: .08em;
  border: 1px solid;
  transition: all .15s;
}
.jbtn-ok { background: #f0fdf4; border-color: #86efac; color: var(--ok); }
.jbtn-ng { background: #fef2f2; border-color: #fca5a5; color: var(--ng); }
.jbtn-ok:active { background: var(--ok); color: #fff; border-color: var(--ok); }
.jbtn-ng:active { background: var(--ng); color: #fff; border-color: var(--ng); }
#result { display: none; font-family: var(--kf); font-size: 13px; letter-spacing: .06em; padding: 4px 0 0; text-align: center; }
#result.show { display: block; }
#result.ok { color: var(--ok); }
#result.ng { color: var(--ng); }

/* トースト */
#save-toast {
  position: fixed;
  bottom: calc(80px + var(--sab));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  font-family: var(--kf);
  font-size: 13px;
  padding: 8px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity .3s, transform .3s;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
#save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 640px) and (orientation: landscape) {
  #main { flex-direction: row; }
  #info-bar { width: 200px; flex-direction: column; align-items: flex-start; border-bottom: none; border-right: 1px solid var(--bd); padding: 20px 16px; gap: 16px; }
  .info-sep { display: none; }
  #info-kanji { font-size: 72px; min-width: auto; }
  #canvas-wrap { flex: 1; }
  #bottom-bar { width: 200px; border-top: none; border-left: 1px solid var(--bd); flex-direction: column; }
}

/* ── モーダル ── */
#modal-ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
@media (min-width: 600px) { #modal-ov { align-items: center; } }
#modal-ov.open { display: flex; }
#modal {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-height: 88dvh;
  display: flex; flex-direction: column;
  animation: slideUp .28s cubic-bezier(.32,1,.26,1);
  padding-bottom: var(--sab);
}
@media (min-width: 600px) {
  #modal { border-radius: 14px; width: min(560px, 96vw); max-height: 85dvh; animation: fadeUp .22s ease; }
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
.mhdr { padding: 16px 20px 14px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.mhdr h2 { font-size: 15px; font-weight: 700; letter-spacing: .06em; }
.mclose { width: 30px; height: 30px; border-radius: 50%; background: var(--bd); border: none; font-size: 14px; color: var(--ink2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mbody { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.mbody::-webkit-scrollbar { display: none; }
.mfooter { padding: 12px 16px; border-top: 1px solid var(--bd); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.add-form { border: 1px dashed var(--bd2); border-radius: var(--r); padding: 12px; }
.add-form-title { font-size: 11px; color: var(--ink3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
.add-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
.afield { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 80px; }
.afield label { font-size: 10px; color: var(--ink3); letter-spacing: .07em; text-transform: uppercase; }
.afield input { padding: 8px 10px; border: 1px solid var(--bd2); border-radius: var(--r); font-size: 16px; font-family: var(--kf); color: var(--ink); outline: none; background: var(--bg); -webkit-appearance: none; }
.afield input:focus { border-color: var(--ink); }
.afield input.ki { width: 52px; text-align: center; }
.btn-add { padding: 9px 16px; background: var(--ink); color: #fff; border: none; border-radius: var(--r); font-size: 14px; cursor: pointer; font-family: var(--uf); align-self: flex-end; letter-spacing: .04em; }
.elist-hdr { display: flex; justify-content: space-between; }
.elist-title { font-size: 11px; color: var(--ink3); letter-spacing: .07em; text-transform: uppercase; }
.ecount { font-size: 11px; color: var(--ink3); }
.erow { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid var(--bd); border-radius: var(--r); }
.ek { font-family: var(--kf); font-size: 24px; min-width: 30px; text-align: center; color: var(--ink); }
.efields { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
.ef { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 80px; }
.ef label { font-size: 10px; color: var(--ink3); letter-spacing: .06em; text-transform: uppercase; }
.ef input { padding: 6px 8px; border: 1px solid var(--bd); border-radius: 4px; font-size: 16px; font-family: var(--kf); color: var(--ink); outline: none; background: var(--bg); -webkit-appearance: none; }
.ef input:focus { border-color: var(--ink); }
.btn-del { width: 30px; height: 30px; flex-shrink: 0; border: 1px solid var(--bd); border-radius: 4px; background: none; color: var(--ink3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-del:active { background: var(--ng); border-color: var(--ng); color: #fff; }
</style>
</head>
<body>
<div id="root">

  <header id="hdr">
    <div id="hdr-title">漢字練習帳</div>
    <div class="hdr-btns">
      <button class="hbtn" id="hide-btn" onclick="toggleHide()">答えを隠す</button>
      <button class="hbtn" onclick="openModal()">編集</button>
    </div>
  </header>

  <nav id="nav">
    <button class="narr" id="btn-prev" onclick="go(-1)">‹</button>
    <div id="pill-wrap"></div>
    <button class="narr" id="btn-next" onclick="go(+1)">›</button>
  </nav>

  <div id="main">
    <div id="info-bar">
      <div id="info-kanji">漢</div>
      <div class="info-sep"></div>
      <div class="info-text">
        <div id="info-yomi">かん</div>
        <div id="info-hint">水＋𦰩</div>
        <div id="info-num">1 / 12</div>
      </div>
    </div>

    <div id="canvas-wrap">
      <div id="ans-overlay"></div>
      <canvas id="write-canvas"></canvas>
    </div>

    <div id="bottom-bar">
      <div id="judge-row">
        <button class="jbtn jbtn-ok" onclick="judge('ok')">○　正解</button>
        <button class="jbtn jbtn-ng" onclick="judge('ng')">✕　不正解</button>
      </div>
      <div id="result"></div>
      <div class="bar-row">
        <button class="act-btn" onclick="clearCanvas()">消す</button>
        <button id="ans-btn" onclick="toggleAns()">答えを見る</button>
        <div class="pen-dot sel" id="pd-s" onclick="setPen(5,'s')" title="細">
          <div class="dot-c" style="width:4px;height:4px"></div>
        </div>
        <div class="pen-dot" id="pd-m" onclick="setPen(9,'m')" title="中">
          <div class="dot-c" style="width:7px;height:7px"></div>
        </div>
        <div class="pen-dot" id="pd-l" onclick="setPen(14,'l')" title="太">
          <div class="dot-c" style="width:11px;height:11px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-ov">
  <div id="modal">
    <div class="mhdr">
      <h2>問題を編集する</h2>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="modal-body"></div>
    <div class="mfooter">
      <button class="hbtn" onclick="closeModal()">キャンセル</button>
      <button class="hbtn on" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<div id="save-toast">保存しました</div>

<script>
const DEFAULT_PROBLEMS = [
  {kanji:"初",yomi:"はじめ・しょ",  hint:"刀＋衣"},
  {kanji:"信",yomi:"しん・まこと",  hint:"人＋言"},
  {kanji:"勉",yomi:"べん",          hint:"冂＋力"},
  {kanji:"練",yomi:"れん・ねる",    hint:"糸＋東"},
  {kanji:"習",yomi:"しゅう・なら",  hint:"羽＋白"},
  {kanji:"読",yomi:"どく・よむ",    hint:"言＋売"},
  {kanji:"書",yomi:"しょ・かく",    hint:"聿＋日"},
  {kanji:"漢",yomi:"かん",          hint:"水＋𦰩"},
  {kanji:"字",yomi:"じ・あざ",      hint:"宀＋子"},
  {kanji:"問",yomi:"もん・とう",    hint:"門＋口"},
  {kanji:"答",yomi:"とう・こたえ",  hint:"竹＋合"},
  {kanji:"題",yomi:"だい",          hint:"是＋頁"},
];

const STORAGE_KEY   = 'kanji-practice-problems';
const JUDGED_KEY    = 'kanji-practice-judged';

let problems = [], cur = 0, penSize = 5, hideMode = false, ansShown = false;
let judged = [], editBuf = [];
let canvas, ctx, drawing = false, lx = 0, ly = 0;
let toastTimer = null;

/* ── LocalStorage ── */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) {
        problems = parsed;
      } else {
        problems = DEFAULT_PROBLEMS.map(p => ({...p}));
      }
    } else {
      problems = DEFAULT_PROBLEMS.map(p => ({...p}));
    }
  } catch(e) {
    problems = DEFAULT_PROBLEMS.map(p => ({...p}));
  }

  try {
    const raw2 = localStorage.getItem(JUDGED_KEY);
    if (raw2) {
      const j = JSON.parse(raw2);
      judged = Array.isArray(j) ? j : new Array(problems.length).fill(null);
      if (judged.length !== problems.length) {
        judged = new Array(problems.length).fill(null);
      }
    } else {
      judged = new Array(problems.length).fill(null);
    }
  } catch(e) {
    judged = new Array(problems.length).fill(null);
  }
}

function saveProblems() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(problems));
    localStorage.setItem(JUDGED_KEY,  JSON.stringify(judged));
    showToast('保存しました');
  } catch(e) {
    showToast('保存に失敗しました');
  }
}

function saveJudged() {
  try {
    localStorage.setItem(JUDGED_KEY, JSON.stringify(judged));
  } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ── 初期化 ── */
function init() {
  canvas = document.getElementById('write-canvas');
  ctx = canvas.getContext('2d');

  loadData();
  fitCanvas();

  window.addEventListener('resize', () => { setTimeout(fitCanvas, 100); });
  window.visualViewport?.addEventListener('resize', () => { setTimeout(fitCanvas, 100); });

  canvas.addEventListener('mousedown',  e => startDraw(e));
  canvas.addEventListener('mousemove',  e => doDraw(e));
  canvas.addEventListener('mouseup',    () => stopDraw());
  canvas.addEventListener('mouseleave', () => stopDraw());
  canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e.touches[0]); }, {passive:false});
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); doDraw(e.touches[0]); },   {passive:false});
  canvas.addEventListener('touchend',   e => { e.preventDefault(); stopDraw(); },              {passive:false});

  judged = judged.length === problems.length ? judged : new Array(problems.length).fill(null);
  renderPills();
  selectProblem(0);

  document.getElementById('modal-ov').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
}

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (w === 0 || h === 0) return;
  canvas.width = w; canvas.height = h;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width, scaleY = canvas.height / r.height;
  return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleY };
}

function startDraw(e) {
  drawing = true;
  const p = getPos(e); lx = p.x; ly = p.y;
  ctx.beginPath(); ctx.arc(p.x, p.y, penSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = '#1c1917'; ctx.fill();
}
function doDraw(e) {
  if (!drawing) return;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = '#1c1917'; ctx.lineWidth = penSize;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.globalAlpha = .94;
  ctx.stroke();
  lx = p.x; ly = p.y;
}
function stopDraw() { drawing = false; ctx.globalAlpha = 1; }
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function renderPills() {
  const wrap = document.getElementById('pill-wrap');
  wrap.innerHTML = '';
  problems.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'pill' + (i === cur ? ' active' : '') + (judged[i] === 'ok' ? ' ok' : '') + (judged[i] === 'ng' ? ' ng' : '');
    d.id = 'pill-' + i;
    d.innerHTML = `<span class="pill-k">${p.kanji}</span><span class="pill-n">${i+1}</span>`;
    d.onclick = () => selectProblem(i);
    wrap.appendChild(d);
  });
  document.getElementById('btn-prev').disabled = (cur === 0);
  document.getElementById('btn-next').disabled = (cur === problems.length - 1);
}

function go(d) { const n = cur + d; if (n >= 0 && n < problems.length) selectProblem(n); }

function selectProblem(i) {
  document.getElementById('pill-' + cur)?.classList.remove('active');
  cur = i;
  const p = problems[i];
  const pill = document.getElementById('pill-' + i);
  pill?.classList.add('active');
  pill?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  document.getElementById('info-kanji').textContent = p.kanji;
  document.getElementById('info-yomi').textContent  = p.yomi;
  document.getElementById('info-hint').textContent  = p.hint;
  document.getElementById('info-num').textContent   = `${i+1} / ${problems.length}`;
  document.getElementById('ans-overlay').textContent = p.kanji;

  ansShown = false;
  document.getElementById('ans-overlay').classList.remove('show');
  document.getElementById('ans-btn').textContent = '答えを見る';
  document.getElementById('ans-btn').classList.remove('showing');
  document.getElementById('judge-row').classList.remove('visible');
  document.getElementById('result').className = '';
  document.getElementById('result').textContent = '';
  document.body.classList.remove('ans-shown');
  clearCanvas();

  document.getElementById('btn-prev').disabled = (cur === 0);
  document.getElementById('btn-next').disabled = (cur === problems.length - 1);
}

function toggleAns() {
  ansShown = !ansShown;
  document.getElementById('ans-overlay').classList.toggle('show', ansShown);
  document.getElementById('ans-btn').classList.toggle('showing', ansShown);
  document.getElementById('ans-btn').textContent = ansShown ? '答えを隠す' : '答えを見る';
  document.getElementById('judge-row').classList.toggle('visible', ansShown);
  document.body.classList.toggle('ans-shown', ansShown);
  if (!ansShown) {
    document.getElementById('result').className = '';
    document.getElementById('result').textContent = '';
  }
}

function judge(res) {
  judged[cur] = res;
  const rb = document.getElementById('result');
  rb.className = 'show ' + (res === 'ok' ? 'ok' : 'ng');
  rb.textContent = res === 'ok' ? '○  正解' : '✕  不正解';
  const pill = document.getElementById('pill-' + cur);
  pill?.classList.remove('ok', 'ng');
  pill?.classList.add(res);
  saveJudged();
  setTimeout(() => { if (cur < problems.length - 1) go(+1); }, 650);
}

function toggleHide() {
  hideMode = !hideMode;
  document.body.classList.toggle('hide-mode', hideMode);
  const btn = document.getElementById('hide-btn');
  btn.classList.toggle('on', hideMode);
  btn.textContent = hideMode ? '答えを表示' : '答えを隠す';
  if (ansShown) toggleAns();
}

function setPen(sz, id) {
  penSize = sz;
  ['s','m','l'].forEach(k => document.getElementById('pd-' + k).classList.remove('sel'));
  document.getElementById('pd-' + id).classList.add('sel');
}

function openModal() {
  editBuf = problems.map(p => ({...p}));
  renderModal();
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal() { document.getElementById('modal-ov').classList.remove('open'); }

function renderModal() {
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  const af = document.createElement('div');
  af.className = 'add-form';
  af.innerHTML = `
    <div class="add-form-title">新しい問題を追加</div>
    <div class="add-row">
      <div class="afield" style="flex:0 0 auto"><label>漢字</label>
        <input class="ki" id="nk" type="text" maxlength="1" placeholder="学" autocomplete="off"/>
      </div>
      <div class="afield"><label>読み方</label>
        <input id="ny" type="text" placeholder="がく・まなぶ" autocomplete="off"/>
      </div>
      <div class="afield"><label>ヒント</label>
        <input id="nh" type="text" placeholder="子＋冖" autocomplete="off"/>
      </div>
      <button class="btn-add" onclick="addEdit()">追加</button>
    </div>`;
  body.appendChild(af);

  const lh = document.createElement('div');
  lh.className = 'elist-hdr';
  lh.innerHTML = `<span class="elist-title">問題一覧</span><span class="ecount">${editBuf.length}問</span>`;
  body.appendChild(lh);

  editBuf.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'erow'; row.id = 'erow-' + i;
    row.innerHTML = `
      <div class="ek" id="ek-${i}">${p.kanji}</div>
      <div class="efields">
        <div class="ef"><label>漢字</label>
          <input type="text" maxlength="1" value="${p.kanji}" autocomplete="off"
            oninput="editBuf[${i}].kanji=this.value;document.getElementById('ek-${i}').textContent=this.value||'？'"
            style="text-align:center;font-size:18px;width:44px"/>
        </div>
        <div class="ef"><label>読み方</label>
          <input type="text" value="${p.yomi}" autocomplete="off" oninput="editBuf[${i}].yomi=this.value"/>
        </div>
        <div class="ef"><label>ヒント</label>
          <input type="text" value="${p.hint}" autocomplete="off" oninput="editBuf[${i}].hint=this.value"/>
        </div>
      </div>
      <button class="btn-del" onclick="delEdit(${i})">×</button>`;
    body.appendChild(row);
  });

  if (!editBuf.length) {
    const em = document.createElement('div');
    em.style.cssText = 'text-align:center;padding:24px;color:var(--ink3);font-size:13px';
    em.textContent = '問題がありません。';
    body.appendChild(em);
  }
}

function addEdit() {
  const k = document.getElementById('nk').value.trim();
  const y = document.getElementById('ny').value.trim();
  const h = document.getElementById('nh').value.trim();
  if (!k) { alert('漢字を入力してください'); return; }
  editBuf.push({ kanji: k, yomi: y || '（未設定）', hint: h || '（未設定）' });
  ['nk','ny','nh'].forEach(id => document.getElementById(id).value = '');
  renderModal();
  setTimeout(() => document.getElementById('modal-body').scrollTop = 9999, 40);
}

function delEdit(i) {
  if (!confirm(`「${editBuf[i].kanji}」を削除しますか？`)) return;
  editBuf.splice(i, 1); renderModal();
}

function saveModal() {
  const v = editBuf.filter(p => p.kanji.trim());
  if (!v.length) { alert('最低1問必要です'); return; }
  problems = v;
  judged = new Array(problems.length).fill(null);
  if (cur >= problems.length) cur = 0;
  renderPills(); selectProblem(cur); closeModal();
  saveProblems();
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
